<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loop Logo Tweaker</title>
<style>
  :root { font-family: system-ui, -apple-system, Segoe UI, sans-serif; color:#1f2937; }
  body { margin:0; display:grid; grid-template-columns: 340px 1fr; min-height:100vh; background:#f8fafc; }
  aside { padding:18px; background:white; border-right:1px solid #e5e7eb; overflow:auto; }
  main { display:grid; place-items:center; padding:24px; }
  h1 { font-size:18px; margin:0 0 6px; }
  p { font-size:13px; color:#64748b; margin:0 0 16px; line-height:1.35; }
  label { display:grid; grid-template-columns: 1fr 58px; gap:8px; align-items:center; font-size:13px; margin:12px 0; }
  input[type=range] { grid-column:1 / -1; width:100%; }
  output { text-align:right; font-variant-numeric: tabular-nums; color:#334155; }
  .stage { width:min(78vmin,760px); aspect-ratio:1/1; background:white; border:1px solid #e5e7eb; border-radius:18px; box-shadow:0 20px 50px rgba(15,23,42,.08); }
  svg { width:100%; height:100%; display:block; }
  button { width:100%; padding:10px 12px; margin-top:10px; border:1px solid #cbd5e1; background:#fff; border-radius:10px; cursor:pointer; }
  button:hover { background:#f1f5f9; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .small { font-size:12px; color:#64748b; }
  textarea { width:100%; height:90px; margin-top:10px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px; }
</style>
</head>
<body>
<aside>
  <h1>Loop Logo Tweaker</h1>
  <p>Drag the sliders. The drawing is generated as a smooth SVG path, so you can export it cleanly.</p>
  <div id="controls"></div>
  <div class="row">
    <button id="downloadSvg">Download SVG</button>
    <button id="downloadPng">Download PNG</button>
  </div>
  <button id="copyPath">Copy SVG path</button>
  <textarea id="pathText" readonly></textarea>
  <p class="small">Tip: use “Crossing gap” to simulate over/under weaving at the center.</p>
</aside>
<main>
  <div class="stage">
    <svg id="svg" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <rect width="1000" height="1000" fill="white"/>
      <g id="logo" transform="translate(500 500)">
        <path id="under" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round"/>
        <path id="over" fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </svg>
  </div>
</main>
<script>
const params = {
  stroke: 34, scale: 1.0, rotation: 0,
  topW: 305, topH: 255, botW: 305, botH: 255,
  inner: 92, waist: 78, neck: 68,
  tallness: 1.0, smooth: .55, gap: 42
};
const defs = [
  ['stroke','Stroke width', 8,80,1], ['scale','Scale', .55,1.35,.01], ['rotation','Rotation', -35,35,1],
  ['topW','Top loop width', 170,430,1], ['topH','Top loop height', 150,360,1],
  ['botW','Bottom loop width',170,430,1], ['botH','Bottom loop height',150,360,1],
  ['inner','Inner loop size',40,160,1], ['waist','Waist crossing',20,150,1],
  ['neck','Center neck length',20,130,1], ['tallness','Vertical stretch',.75,1.35,.01],
  ['smooth','Smoothness',.2,.9,.01], ['gap','Crossing gap',0,90,1]
];
const controls = document.getElementById('controls');
for (const [key,label,min,max,step] of defs) {
  const wrap = document.createElement('label');
  wrap.innerHTML = `<span>${label}</span><output id="out-${key}"></output><input id="${key}" type="range" min="${min}" max="${max}" step="${step}" value="${params[key]}">`;
  controls.appendChild(wrap);
  wrap.querySelector('input').addEventListener('input', e => { params[key] = Number(e.target.value); draw(); });
}
function pt(x,y){ return [x, y*params.tallness]; }
function makePath(skipGap=false){
  const s=params.smooth;
  const T=params.topH, B=params.botH, Wt=params.topW, Wb=params.botW, I=params.inner, waist=params.waist, neck=params.neck;
  const cmds=[];
  function M(p){cmds.push(`M ${p[0].toFixed(1)} ${p[1].toFixed(1)}`)}
  function C(a,b,c){cmds.push(`C ${a[0].toFixed(1)} ${a[1].toFixed(1)}, ${b[0].toFixed(1)} ${b[1].toFixed(1)}, ${c[0].toFixed(1)} ${c[1].toFixed(1)}`)}
  M(pt(-waist, -neck));
  C(pt(-Wt*.86,-T*.08), pt(-Wt*.62,-T*.92), pt(-32,-T));
  C(pt(Wt*.72,-T*1.08), pt(Wt*.95,-T*.28), pt(Wt*.48,-T*.02));
  C(pt(Wt*.14,T*.15), pt(-I*.82,T*.14), pt(-I*.56,-I*.22));
  C(pt(-I*.35,-I*.88), pt(I*.88,-I*.78), pt(I*.62,-I*.04));
  C(pt(I*.48,I*.50), pt(waist*.10,neck*.43), pt(waist,neck));
  C(pt(Wb*.86,B*.08), pt(Wb*.62,B*.92), pt(32,B));
  C(pt(-Wb*.72,B*1.08), pt(-Wb*.95,B*.28), pt(-Wb*.48,B*.02));
  C(pt(-Wb*.14,-B*.15), pt(I*.82,-B*.14), pt(I*.56,I*.22));
  C(pt(I*.35,I*.88), pt(-I*.88,I*.78), pt(-I*.62,I*.04));
  C(pt(-I*.48,-I*.50), pt(-waist*.10,-neck*.43), pt(-waist,-neck));
  return cmds.join(' ');
}
function draw(){
  for (const [key] of defs) document.getElementById('out-'+key).textContent = params[key];
  const path = makePath();
  const logo = document.getElementById('logo');
  logo.setAttribute('transform',`translate(500 500) scale(${params.scale}) rotate(${params.rotation})`);
  for (const id of ['under','over']) {
    const el=document.getElementById(id);
    el.setAttribute('d', path);
    el.setAttribute('stroke-width', params.stroke);
  }
  // crude over/under: top path is dashed with a gap at the center crossing.
  const over=document.getElementById('over');
  const gap=params.gap;
  over.setAttribute('stroke-dasharray', gap ? `900 ${gap} 980 ${gap} 9999` : 'none');
  document.getElementById('pathText').value = path;
}
function download(name, text, type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type})); a.download=name; a.click(); URL.revokeObjectURL(a.href);
}
downloadSvg.onclick=()=>download('loop-logo.svg', svg.outerHTML, 'image/svg+xml');
copyPath.onclick=async()=>{ await navigator.clipboard.writeText(pathText.value); copyPath.textContent='Copied'; setTimeout(()=>copyPath.textContent='Copy SVG path',900); };
downloadPng.onclick=()=>{
  const canvas=document.createElement('canvas'); canvas.width=2000; canvas.height=2000;
  const ctx=canvas.getContext('2d'); const img=new Image();
  img.onload=()=>{ ctx.drawImage(img,0,0,2000,2000); canvas.toBlob(b=>download('loop-logo.png', b, 'image/png')); };
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg.outerHTML);
};
draw();
</script>
</body>
</html>
